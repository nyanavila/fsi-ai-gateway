apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-demo
  namespace: fsi-ai-gateway
  labels:
    app: gateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-demo
  template:
    metadata:
      labels:
        app: gateway-demo
    spec:
      containers:
        - name: gateway-demo
          image: quay.io/navila/gateway-demo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-demo
  namespace: fsi-ai-gateway
spec:
  selector:
    app: gateway-demo
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gateway-demo
  namespace: fsi-ai-gateway
spec:
  to:
    kind: Service
    name: gateway-demo
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
