apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secrets
  namespace: fsi-ai-gateway
  labels:
    app: ai-gateway
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"
  # Add additional provider keys here when expanding beyond Anthropic:
  # OPENAI_API_KEY: "sk-..."
  # AZURE_OPENAI_KEY: "..."
