# Vault / ExternalSecret integration.
#
# Option A (recommended): OpenShift Secrets Store CSI Driver + Vault provider
#   Install: oc apply -f https://raw.githubusercontent.com/secrets-store/secrets-store-csi-driver/...
#   Then use SecretProviderClass below.
#
# Option B: External Secrets Operator (ESO)
#   Install: helm install eso external-secrets/external-secrets -n external-secrets --create-namespace
#   Then use ExternalSecret below.
#
# Both approaches eliminate the need to store real secrets in Git.
# The `secret.yaml` file (stringData) is for bootstrap/dev only.

# ── Option A: Secrets Store CSI Driver ───────────────────────────────────────
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-gateway-vault
  namespace: fsi-ai-gateway
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.internal.example.com"   # <-- your Vault URL
    vaultKubernetesMountPath: "kubernetes"
    roleName: "ai-gateway"
    objects: |
      - objectName: "anthropic-api-key"
        secretPath: "secret/data/fsi/ai-gateway"
        secretKey: "anthropic_api_key"
  secretObjects:
    - secretName: ai-gateway-secrets
      type: Opaque
      data:
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
---
